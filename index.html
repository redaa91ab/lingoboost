<html lang="en">

  <div class="niveau-anglais">

    <select id="level">
      <option value="A1">A1</option>
      <option value="A2">A2</option>
      <option value="B1">B1</option>
      <option value="B2">B2</option>
      <option value="C1">C1</option>

    <label for="pdfUpload">Upload votre fichier PDF :</label>

    <button id="processBtn">Analyser le texte</button>
